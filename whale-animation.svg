<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 280" width="500" height="280">
  <defs>
    <!-- 海洋背景渐变 -->
    <linearGradient id="oceanBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0a0e27"/>
      <stop offset="40%" stop-color="#0d1b4b"/>
      <stop offset="100%" stop-color="#061228"/>
    </linearGradient>

    <!-- 鲸鱼主体渐变（深邃3D感） -->
    <linearGradient id="whaleBody" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#5b8dd9"/>
      <stop offset="25%" stop-color="#3b6fc4"/>
      <stop offset="60%" stop-color="#2a5fa8"/>
      <stop offset="100%" stop-color="#1a3d7c"/>
    </linearGradient>

    <!-- 鲸鱼背部高光 -->
    <linearGradient id="whaleHighlight" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#8cb8ff" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#5b8dd9" stop-opacity="0"/>
    </linearGradient>

    <!-- 腹部渐变 -->
    <linearGradient id="whaleBelly" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#d4e8ff"/>
      <stop offset="60%" stop-color="#9ec8ff"/>
      <stop offset="100%" stop-color="#6fa8e8"/>
    </linearGradient>

    <!-- 尾鳍渐变 -->
    <linearGradient id="whaleTail" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3b6fc4"/>
      <stop offset="100%" stop-color="#1a3d7c"/>
    </linearGradient>

    <!-- 胸鳍渐变 -->
    <linearGradient id="whaleFin" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4a7fd4"/>
      <stop offset="100%" stop-color="#2a5fa8"/>
    </linearGradient>

    <!-- 眼睛高光 -->
    <radialGradient id="eyeMain" cx="35%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="40%" stop-color="#c8e6ff"/>
      <stop offset="100%" stop-color="#4a7fd4"/>
    </radialGradient>

    <!-- 发光气泡 -->
    <radialGradient id="bubble" cx="40%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="50%" stop-color="#87ceeb" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#4a90d9" stop-opacity="0"/>
    </radialGradient>

    <!-- 水面光斑 -->
    <radialGradient id="caustic" cx="50%" cy="0%" r="60%">
      <stop offset="0%" stop-color="#4a90d9" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#4a90d9" stop-opacity="0"/>
    </radialGradient>

    <!-- 柔和阴影 -->
    <filter id="whaleShadow" x="-20%" y="-30%" width="140%" height="160%">
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-color="#000820" flood-opacity="0.4"/>
    </filter>

    <!-- 发光效果 -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- 水面波纹 -->
    <filter id="waterBlur">
      <feGaussianBlur stdDeviation="1.5"/>
    </filter>
  </defs>

  <!-- ── 海洋背景 ── -->
  <rect width="500" height="280" fill="url(#oceanBg)" rx="12"/>

  <!-- 水面光线 -->
  <ellipse cx="250" cy="0" rx="220" ry="40" fill="url(#caustic)"/>

  <!-- 远景小气泡 -->
  <g opacity="0.35">
    <circle cx="60" cy="220" r="2.5" fill="url(#bubble)">
      <animate attributeName="cy" values="220;80;220" dur="7s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.7;0" dur="7s" repeatCount="indefinite"/>
    </circle>
    <circle cx="85" cy="240" r="1.5" fill="url(#bubble)">
      <animate attributeName="cy" values="240;60;240" dur="9s" begin="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.5;0" dur="9s" begin="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="420" cy="230" r="2" fill="url(#bubble)">
      <animate attributeName="cy" values="230;50;230" dur="8s" begin="1s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.6;0" dur="8s" begin="1s" repeatCount="indefinite"/>
    </circle>
    <circle cx="450" cy="210" r="1.8" fill="url(#bubble)">
      <animate attributeName="cy" values="210;70;210" dur="6s" begin="3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.5;0" dur="6s" begin="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="35" cy="200" r="1.2" fill="url(#bubble)">
      <animate attributeName="cy" values="200;90;200" dur="5s" begin="4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.4;0" dur="5s" begin="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="470" cy="250" r="1.5" fill="url(#bubble)">
      <animate attributeName="cy" values="250;100;250" dur="7s" begin="5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.5;0" dur="7s" begin="5s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- ── 水波纹底部 ── -->
  <ellipse cx="250" cy="230" rx="220" ry="18" fill="#0d1b4b" opacity="0.6" filter="url(#waterBlur)">
    <animate attributeName="ry" values="18;22;18" dur="4s" repeatCount="indefinite"/>
  </ellipse>
  <ellipse cx="250" cy="240" rx="200" ry="12" fill="#0a0e27" opacity="0.8">
    <animate attributeName="ry" values="12;15;12" dur="3s" begin="0.5s" repeatCount="indefinite"/>
  </ellipse>

  <!-- ── 鲸鱼整体（游泳动画） ── -->
  <g filter="url(#whaleShadow)">
    <!-- 上下浮动 -->
    <animateTransform attributeName="transform" type="translate"
      values="0,0; 0,-6; 0,0; 0,4; 0,0"
      dur="4.5s" repeatCount="indefinite"/>

    <!-- 身体中段 -->
    <g>
      <!-- 主体阴影层 -->
      <ellipse cx="255" cy="145" rx="95" ry="42" fill="#0a1e5c" opacity="0.35"/>

      <!-- 鲸鱼主体 -->
      <ellipse cx="250" cy="140" rx="95" ry="42" fill="url(#whaleBody)"/>

      <!-- 背部高光（3D立体感） -->
      <ellipse cx="250" cy="120" rx="85" ry="22" fill="url(#whaleHighlight)" opacity="0.7"/>

      <!-- 腹部 -->
      <ellipse cx="250" cy="158" rx="75" ry="26" fill="url(#whaleBelly)" opacity="0.85"/>

      <!-- 腹部纹路 -->
      <path d="M200,158 Q250,148 300,158" stroke="#6fa8e8" stroke-width="1" fill="none" opacity="0.5"/>
      <path d="M210,165 Q250,156 290,165" stroke="#6fa8e8" stroke-width="0.8" fill="none" opacity="0.4"/>
    </g>

    <!-- 头部 -->
    <g>
      <ellipse cx="158" cy="140" rx="55" ry="44" fill="url(#whaleBody)"/>
      <!-- 头部高光 -->
      <ellipse cx="158" cy="115" rx="40" ry="22" fill="url(#whaleHighlight)" opacity="0.6"/>
      <!-- 头部腹部 -->
      <ellipse cx="158" cy="160" rx="40" ry="24" fill="url(#whaleBelly)" opacity="0.8"/>
    </g>

    <!-- 眼睛 -->
    <g>
      <circle cx="135" cy="128" r="13" fill="url(#eyeMain)" filter="url(#glow)"/>
      <circle cx="135" cy="128" r="8" fill="#1a3d7c"/>
      <circle cx="135" cy="128" r="4.5" fill="#0a1840"/>
      <!-- 眼神高光 -->
      <circle cx="131" cy="123" r="3.5" fill="#ffffff" opacity="0.95"/>
      <circle cx="138" cy="125" r="1.8" fill="#ffffff" opacity="0.6"/>

      <!-- 眨眼 -->
      <ellipse cx="135" cy="128" rx="13" ry="0" fill="#3b6fc4" opacity="0">
        <animate attributeName="ry" values="0;13;0" dur="0.25s" begin="3s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0;0.9;0" dur="0.25s" begin="3s" repeatCount="indefinite"/>
      </ellipse>
    </g>

    <!-- 微笑嘴巴 -->
    <path d="M112,155 Q108,162 118,166 Q130,168 140,163"
      stroke="#1a3d7c" stroke-width="2.5" fill="none"
      stroke-linecap="round" opacity="0.8"/>

    <!-- 腮红 -->
    <ellipse cx="120" cy="150" rx="12" ry="7" fill="#ff9ab4" opacity="0.45"/>
    <ellipse cx="165" cy="148" rx="10" ry="6" fill="#ff9ab4" opacity="0.35"/>

    <!-- 小鼻孔 -->
    <ellipse cx="130" cy="143" rx="2.5" ry="1.8" fill="#1a3d7c" opacity="0.7"/>
    <ellipse cx="142" cy="142" rx="2.2" ry="1.6" fill="#1a3d7c" opacity="0.6"/>

    <!-- 胸鳍（左侧） -->
    <path d="M195,165 Q175,180 165,195 Q185,188 200,175 Q202,168 195,165"
      fill="url(#whaleFin)" opacity="0.9">
      <animateTransform attributeName="transform" type="rotate"
        values="-5 195 168; -20 195 168; -5 195 168; 10 195 168; -5 195 168"
        dur="3s" repeatCount="indefinite"/>
    </path>

    <!-- 胸鳍（右侧） -->
    <path d="M220,162 Q240,178 250,193 Q230,186 215,172 Q212,165 220,162"
      fill="url(#whaleFin)" opacity="0.85">
      <animateTransform attributeName="transform" type="rotate"
        values="5 220 162; 20 220 162; 5 220 162; -10 220 162; 5 220 162"
        dur="3.2s" begin="0.3s" repeatCount="indefinite"/>
    </path>

    <!-- 尾鳍 -->
    <g>
      <!-- 尾柄 -->
      <path d="M345,140 Q365,140 375,140" stroke="url(#whaleTail)" stroke-width="18"
        fill="none" stroke-linecap="round"/>

      <!-- 主尾鳍 -->
      <path d="M365,140 Q390,108 400,95 Q395,125 385,140 Q390,155 400,165 Q390,152 365,140"
        fill="url(#whaleTail)" opacity="0.95">
        <animateTransform attributeName="transform" type="rotate"
          values="-8 365 140; 8 365 140; -8 365 140"
          dur="2.5s" repeatCount="indefinite"/>
      </path>

      <!-- 尾鳍高光 -->
      <path d="M370,140 Q390,112 398,100 Q394,125 386,140 Q390,152 398,160 Q390,148 370,140"
        fill="#5b8dd9" opacity="0.35">
        <animateTransform attributeName="transform" type="rotate"
          values="-8 365 140; 8 365 140; -8 365 140"
          dur="2.5s" repeatCount="indefinite"/>
      </path>
    </g>

    <!-- 背鳍 -->
    <path d="M270,98 Q278,80 288,76 Q282,92 280,98"
      fill="url(#whaleFin)" opacity="0.8">
      <animateTransform attributeName="transform" type="translate"
        values="0,0; 0,-6; 0,0; 0,4; 0,0"
        dur="4.5s" repeatCount="indefinite"/>
    </path>
  </g>

  <!-- ── 近景气泡（最大最亮） ── -->
  <g>
    <circle cx="200" cy="100" r="5" fill="url(#bubble)" opacity="0">
      <animate attributeName="cy" values="180;50;180" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.9;0" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="r" values="3;6;3" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="320" cy="120" r="3.5" fill="url(#bubble)" opacity="0">
      <animate attributeName="cy" values="200;40;200" dur="5s" begin="1s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.8;0" dur="5s" begin="1s" repeatCount="indefinite"/>
      <animate attributeName="r" values="2;5;2" dur="5s" begin="1s" repeatCount="indefinite"/>
    </circle>
    <circle cx="260" cy="90" r="4" fill="url(#bubble)" opacity="0">
      <animate attributeName="cy" values="190;30;190" dur="4.5s" begin="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.85;0" dur="4.5s" begin="2s" repeatCount="indefinite"/>
      <animate attributeName="r" values="2.5;5;2.5" dur="4.5s" begin="2s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- ── 水面光斑动画 ── -->
  <g opacity="0.2" filter="url(#glow)">
    <circle cx="180" cy="10" r="25" fill="#4a90d9">
      <animate attributeName="cx" values="180;200;180;160;180" dur="8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.3;0.8;0.3;0.6;0.3" dur="8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="300" cy="5" r="18" fill="#6ab0ff">
      <animate attributeName="cx" values="300;280;300;320;300" dur="6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.2;0.7;0.2;0.5;0.2" dur="6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="400" cy="15" r="22" fill="#4a90d9">
      <animate attributeName="cx" values="400;420;400;380;400" dur="7s" begin="1s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.25;0.6;0.25;0.4;0.25" dur="7s" begin="1s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>
